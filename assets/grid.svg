    <text x="240" y="74">Django</text>
    <text x="360" y="74">PostgreSQL</text>
    <text x="486" y="74">PyTorch</text>
    <text x="606" y="74">OpenCV</text>
    <text x="732" y="74">YOLO</text>
    <text x="852" y="74">REST APIs</text>
    <text x="970" y="74">Docker</text>
    <text x="1088" y="74" text-anchor="end">GitHub Actions</text>
  </g>
  <g fill="#00E5FF" opacity="0.75">
    <circle cx="180" cy="170" r="6" />
    <circle cx="300" cy="170" r="6" />
    <circle cx="420" cy="170" r="6" />
    <circle cx="540" cy="170" r="6" />
    <circle cx="660" cy="170" r="6" />
    <circle cx="780" cy="170" r="6" />
    <circle cx="900" cy="170" r="6" />
    <circle cx="1020" cy="170" r="6" />
  </g>
  <rect x="100" y="214" width="1000" height="2" fill="#22314A" />
