<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" role="img" aria-labelledby="title desc">
  <title id="title">Animated mission status bar</title>
  <desc id="desc">A minimal animated mission bar for the profile headline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0B1120" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.2" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>
  <rect width="1200" height="180" rx="22" fill="url(#bg)" />
  <g opacity="0.12" stroke="#94A3B8" stroke-width="1">
    <path d="M60 46H1140M60 90H1140M60 134H1140" />
    <path d="M120 24V156M300 24V156M480 24V156M660 24V156M840 24V156M1020 24V156" />
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" text-anchor="middle">
    <text x="600" y="56" font-size="15" letter-spacing="4" fill="#00F5FF">MISSION</text>
    <text x="600" y="86" font-size="14" fill="#94A3B8">research to production</text>
  </g>
  <rect x="110" y="102" width="980" height="20" rx="10" fill="#0B1120" stroke="#22314A" />
  <rect x="110" y="102" width="420" height="20" rx="10" fill="url(#line)">
    <animate attributeName="x" values="110;430;110" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="width" values="320;520;320" dur="4.8s" repeatCount="indefinite" />
  </rect>
  <rect x="110" y="102" width="980" height="20" rx="10" fill="none" stroke="#1F2937" />
  <g filter="url(#glow)">
    <circle cx="150" cy="112" r="6" fill="#00F5FF">
      <animate attributeName="cx" values="150;1040;150" dur="7s" repeatCount="indefinite" />
      <animate attributeName="r" values="5;8;5" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="1050" cy="112" r="4" fill="#8B5CF6">
      <animate attributeName="cy" values="112;94;112" dur="3.6s" repeatCount="indefinite" />
    </circle>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" fill="#F8FAFC">
    <text x="110" y="152" font-size="16">Designing and shipping AI systems that turn research into dependable products.</text>
  </g>
</svg>