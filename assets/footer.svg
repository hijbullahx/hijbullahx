<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">Animated footer</title>
  <desc id="desc">A cinematic footer with floating particles and a glowing wave.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0B1120" />
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.06" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.06" />
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0" />
      <stop offset="50%" stop-color="#00F5FF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  <rect width="1200" height="220" rx="24" fill="url(#bg)" />
  <g opacity="0.1" stroke="#94A3B8" stroke-width="1">
    <path d="M0 70H1200M0 120H1200M0 170H1200" />
    <path d="M100 0V220M250 0V220M400 0V220M550 0V220M700 0V220M850 0V220M1000 0V220M1150 0V220" />
  </g>
  <path d="M0 124C120 92 240 92 360 124C480 156 600 156 720 124C840 92 960 92 1080 124C1140 140 1200 146 1200 146V220H0Z" fill="url(#wave)">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" values="M0 124C120 92 240 92 360 124C480 156 600 156 720 124C840 92 960 92 1080 124C1140 140 1200 146 1200 146V220H0Z;M0 116C120 150 240 150 360 116C480 82 600 82 720 116C840 150 960 150 1080 116C1140 96 1200 88 1200 88V220H0Z;M0 124C120 92 240 92 360 124C480 156 600 156 720 124C840 92 960 92 1080 124C1140 140 1200 146 1200 146V220H0Z" />
  </path>
  <rect x="130" y="70" width="940" height="2" fill="#22314A" />
  <rect x="130" y="70" width="260" height="2" fill="url(#beam)">
    <animate attributeName="x" values="130;810;130" dur="6.5s" repeatCount="indefinite" />
  </rect>
  <g filter="url(#glow)">
    <circle cx="180" cy="88" r="5" fill="#00F5FF">
      <animate attributeName="cy" values="88;76;88" dur="3.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="360" cy="58" r="4" fill="#8B5CF6">
      <animate attributeName="cy" values="58;74;58" dur="4.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="620" cy="94" r="6" fill="#00F5FF">
      <animate attributeName="cy" values="94;78;94" dur="4.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="880" cy="66" r="4" fill="#8B5CF6">
      <animate attributeName="cy" values="66;84;66" dur="3.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1040" cy="88" r="5" fill="#00F5FF">
      <animate attributeName="cy" values="88;76;88" dur="4.4s" repeatCount="indefinite" />
    </circle>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" text-anchor="middle">
    <text x="600" y="42" font-size="14" letter-spacing="4" fill="#00F5FF">HIJBULLAH AI LAB</text>
    <text x="600" y="192" font-size="14" fill="#94A3B8">build · research · deploy · repeat</text>
  </g>
</svg>
